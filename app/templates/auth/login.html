<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 成绩分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; display: flex; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-card {
            max-width: 420px; margin: 0 auto; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); border: none;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #4A90D9, #357ABD);
            padding: 32px 40px 24px; text-align: center; color: #fff;
        }
        .login-header i { font-size: 40px; margin-bottom: 12px; }
        .login-header h4 { margin: 0; font-weight: 600; }
        .login-body { padding: 32px 40px 36px; }
        .login-body .form-control {
            border-radius: 8px; padding: 10px 14px; font-size: 14px;
            border: 1px solid #ddd; transition: border-color 0.2s;
        }
        .login-body .form-control:focus { border-color: #4A90D9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }
        .login-body .btn-primary {
            background: #4A90D9; border-color: #4A90D9; border-radius: 8px;
            padding: 10px; font-size: 15px; font-weight: 500;
        }
        .login-body .btn-primary:hover { background: #357ABD; border-color: #357ABD; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="login-header">
                <i class="bi bi-mortarboard-fill d-block"></i>
                <h4>成绩分析系统</h4>
                <small class="opacity-75">请登录以继续</small>
            </div>
            <div class="login-body">
                {% if error %}
                <div class="alert alert-danger py-2 mb-3"><i class="bi bi-exclamation-circle me-1"></i> {{ error }}</div>
                {% endif %}
                <form method="post" action="/login">
                    <div class="mb-3">
                        <label class="form-label text-muted small">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control border-start-0" placeholder="请输入用户名" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small">密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control border-start-0" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i> 登录</button>
                </form>
                <p class="text-muted text-center mt-3 small mb-0">默认账户: admin / admin123</p>
            </div>
        </div>
    </div>
</body>
</html>
